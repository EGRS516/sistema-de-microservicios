services:
  # ── Infrastructure ────────────────────────────────────────────────────

  redis:
    image: redis:alpine
    container_name: delivery_redis
    ports:
      - '6379:6379'
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-orders:
    image: postgres:15
    container_name: delivery_postgres_orders
    environment:
      POSTGRES_DB: ${POSTGRES_ORDERS_DB}
      POSTGRES_USER: ${POSTGRES_ORDERS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ORDERS_PASSWORD}
    ports:
      - '5434:5432'
    volumes:
      - pgdata_orders:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${POSTGRES_ORDERS_USER} -d ${POSTGRES_ORDERS_DB}' ]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-payments:
    image: postgres:15
    container_name: delivery_postgres_payments
    environment:
      POSTGRES_DB: ${POSTGRES_PAYMENTS_DB}
      POSTGRES_USER: ${POSTGRES_PAYMENTS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PAYMENTS_PASSWORD}
    ports:
      - '5433:5432'
    volumes:
      - pgdata_payments:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${POSTGRES_PAYMENTS_USER} -d ${POSTGRES_PAYMENTS_DB}' ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Microservices ─────────────────────────────────────────────────────

  orders-service:
    build:
      context: .
      dockerfile: orders-service/Dockerfile
    container_name: delivery_orders
    env_file: ./orders-service/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_ORDERS_USER}:${POSTGRES_ORDERS_PASSWORD}@postgres-orders:5432/${POSTGRES_ORDERS_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3001:3001'
    depends_on:
      redis:
        condition: service_healthy
      postgres-orders:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1' ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  payments-service:
    build:
      context: .
      dockerfile: payments-service/Dockerfile
    container_name: delivery_payments
    env_file: ./payments-service/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_PAYMENTS_USER}:${POSTGRES_PAYMENTS_PASSWORD}@postgres-payments:5432/${POSTGRES_PAYMENTS_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3002:3002'
    depends_on:
      redis:
        condition: service_healthy
      postgres-payments:
        condition: service_healthy
      orders-service:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD-SHELL', 'wget -qO- http://localhost:3002/health || exit 1' ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  notifications-service:
    build:
      context: .
      dockerfile: notifications-service/Dockerfile
    container_name: delivery_notifications
    env_file: ./notifications-service/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3003:3003'
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD-SHELL', 'wget -qO- http://localhost:3003/health || exit 1' ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: delivery_gateway
    env_file: ./api-gateway/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ORDERS_SERVICE_URL: http://orders-service:3001
      PAYMENTS_SERVICE_URL: http://payments-service:3002
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:3003
    ports:
      - '3000:3000'
    depends_on:
      orders-service:
        condition: service_healthy
      payments-service:
        condition: service_healthy
      notifications-service:
        condition: service_healthy
    healthcheck:
      test: [ 'CMD-SHELL', 'wget -qO- http://localhost:3000/ || exit 1' ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  pgdata_orders:
  pgdata_payments:
